<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#06142b" />
    <meta name="description" content="Professional route planning and calendar management application for delivery services" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FCalendar" />
    <meta name="application-name" content="FCalendar" />
    <meta name="msapplication-TileColor" content="#06142b" />
    <meta name="msapplication-TileImage" content="/icon-192x192.png" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!-- Map tile host warm-up (OSM + Google Streets/Satellite) -->
    <link rel="dns-prefetch" href="//tile.openstreetmap.org" />
    <link rel="dns-prefetch" href="//mt0.google.com" />
    <link rel="dns-prefetch" href="//mt1.google.com" />
    <link rel="dns-prefetch" href="//mt2.google.com" />
    <link rel="dns-prefetch" href="//mt3.google.com" />
    <link rel="preconnect" href="https://tile.openstreetmap.org" crossorigin />
    <link rel="preconnect" href="https://mt0.google.com" crossorigin />
    <link rel="preconnect" href="https://mt1.google.com" crossorigin />
    <link rel="preconnect" href="https://mt2.google.com" crossorigin />
    <link rel="preconnect" href="https://mt3.google.com" crossorigin />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icon-192x192.png" />
    
    <title>FCalendar - Route & Calendar Management</title>



    <script>
      // Prevent flash of unstyled content (FOUC)
      (function() {
        const theme = localStorage.getItem('theme') || 
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.classList.add(theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
